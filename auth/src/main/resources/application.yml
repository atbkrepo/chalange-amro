management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_PROBABILITY:1.0}
    export:
      zipkin:
        enabled: ${ZIPKIN_ENABLED:true}
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false

spring:
  application:
    name: auth
  config:
    import: "configserver:${CONFIG_SERVER_URL:https://localhost:8888}"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      tls:
        enabled: ${CONFIG_TLS_ENABLED:true}
        trust-store: ${CONFIG_TLS_TRUST_STORE:file:../ssl/truststore.p12}
        trust-store-password: ${CONFIG_TLS_TRUST_STORE_PASSWORD:changeit}
        trust-store-type: PKCS12
