services:
  discovery:
    build: ./discovery
    container_name: discovery
    ports:
      - "8761:8761"
    environment:
      SPRING_SECURITY_USER_NAME: ${EUREKA_USER}
      SPRING_SECURITY_USER_PASSWORD: ${EUREKA_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://${EUREKA_USER}:${EUREKA_PASSWORD}@localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  config-server:
    build: ./config
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      discovery:
        condition: service_healthy
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${CONFIG_GIT_URI:-git@github.com:atbkrepo/config-server.git}
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: ${CONFIG_GIT_LABEL:-main}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@discovery:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: config-server
      SSL_ENABLED: true
      SSL_KEY_STORE: file:/app/ssl/keystore.p12
      SSL_KEY_STORE_PASSWORD: ${SSL_KEY_STORE_PASSWORD:-changeit}
      SSL_KEY_STORE_TYPE: PKCS12
      SSL_KEY_ALIAS: config-server
    volumes:
      - ./config/ssl/keystore.p12:/app/ssl/keystore.p12:ro
      - ./config/ssh/id_rsa:/root/.ssh/id_rsa:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:8888/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  auth-postgres:
    image: postgres:17
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  orders-postgres:
    image: postgres:17
    container_name: orders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ORDERS_POSTGRES_DB}
      POSTGRES_USER: ${ORDERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - orders-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_POSTGRES_USER} -d ${ORDERS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-app:
    build: ./auth
    container_name: auth-app
    ports:
      - "9000:9000"
    depends_on:
      zipkin:
        condition: service_started
      auth-postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: https://config-server:8888
      CONFIG_TLS_TRUST_STORE: file:/app/ssl/truststore.p12
      CONFIG_TLS_TRUST_STORE_PASSWORD: ${SSL_KEY_STORE_PASSWORD:-changeit}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/${AUTH_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${AUTH_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      SERVICE_CLIENT_ID: ${SERVICE_CLIENT_ID}
      SERVICE_CLIENT_SECRET: ${SERVICE_CLIENT_SECRET}
      EXTERNAL_CLIENT_ID: ${EXTERNAL_CLIENT_ID}
      EXTERNAL_CLIENT_SECRET: ${EXTERNAL_CLIENT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@discovery:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: auth-app
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    volumes:
      - ./ssl/truststore.p12:/app/ssl/truststore.p12:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  orders-app:
    build: ./orders
    container_name: orders-app
    ports:
      - "8080:8080"
    depends_on:
      zipkin:
        condition: service_started
      orders-postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery:
        condition: service_healthy
      auth-app:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: https://config-server:8888
      CONFIG_TLS_TRUST_STORE: file:/app/ssl/truststore.p12
      CONFIG_TLS_TRUST_STORE_PASSWORD: ${SSL_KEY_STORE_PASSWORD:-changeit}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-postgres:5432/${ORDERS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${ORDERS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}
      AUTH_SERVER_JWK_SET_URI: http://auth-app:9000/oauth2/jwks
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-noreply@orders.xyz.com}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@discovery:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: orders-app
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SSL_ENABLED: true
      SSL_KEY_STORE: file:/app/ssl/keystore.p12
      SSL_KEY_STORE_PASSWORD: ${SSL_KEY_STORE_PASSWORD:-changeit}
      SSL_KEY_STORE_TYPE: PKCS12
      SSL_KEY_ALIAS: orders
    volumes:
      - ./config/ssl/keystore.p12:/app/ssl/keystore.p12:ro
      - ./ssl/truststore.p12:/app/ssl/truststore.p12:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

volumes:
  auth-postgres-data:
  orders-postgres-data:
