spring:
  cloud:
    config:
      enabled: false
  sql:
    init:
      mode: never
  datasource:
    url: jdbc:h2:mem:orders_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 3025

eureka:
  client:
    enabled: false

management:
  tracing:
    export:
      zipkin:
        enabled: false
