spring:
  application:
    name: orders
  config:
    import: "configserver:${CONFIG_SERVER_URL:https://localhost:8888}"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    config:
      tls:
        enabled: ${CONFIG_TLS_ENABLED:true}
        trust-store: ${CONFIG_TLS_TRUST_STORE:file:../ssl/truststore.p12}
        trust-store-password: ${CONFIG_TLS_TRUST_STORE_PASSWORD:changeit}
        trust-store-type: PKCS12
